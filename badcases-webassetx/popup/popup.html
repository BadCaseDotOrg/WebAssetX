<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevTools Popup</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="header-container">
  <img id="header-img" src="../icons/banner.png" alt="DevTools Header">
</div>
<div class="toggle-container">
  <span class="toggle-label">Enable on this domain</span>
  <label class="toggle-switch">
    <input type="checkbox" id="toggleFileTracker">
    <span class="slider"></span>
  </label>
</div>
<script src="popup.js"></script>
</body>
</html>
